sources:
  - name: bronze
    database: spacex_raw
    schema: bronze
    tables:
      - name: launches
        description: "Raw SpaceX launches loaded by Airflow"
        columns:
          - name: id
            tests: [unique, not_null]
          - name: payload
            tests: [not_null]
          - name: loaded_at
            tests: [not_null]

      - name: rockets                               
        description: "Raw SpaceX rockets metadata"
        columns:
          - name: id
            tests: [unique, not_null]
          - name: payload
            tests: [not_null]

      - name: launchpads
        description: "Raw SpaceX launchpads metadata"
        columns:
          - name: id
            tests: [unique, not_null]
          - name: payload
            tests: [not_null]